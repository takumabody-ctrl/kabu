<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takuma Investment Radar v2</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --win: #3fb950; --risk: #f85149; --text: #c9d1d9; --gold: #d4af37; }
        body { font-family: -apple-system, "Helvetica Neue", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; line-height: 1.4; }
        .header { text-align: center; padding: 20px 0; border-bottom: 2px solid var(--accent); }
        .config-card { background: var(--card); border-radius: 15px; padding: 20px; margin: 15px 0; border: 1px solid #30363d; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .param-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 13px; font-weight: bold; }
        input[type="range"] { width: 55%; accent-color: var(--accent); }
        .update-btn { width: 100%; padding: 15px; background: linear-gradient(135deg, var(--accent), #1f6feb); color: white; border: none; border-radius: 10px; font-weight: 800; font-size: 16px; cursor: pointer; transition: transform 0.1s; }
        .update-btn:active { transform: scale(0.98); }
        .stock-item { background: var(--card); border-radius: 12px; padding: 18px; margin-bottom: 15px; border-left: 5px solid var(--accent); position: relative; }
        .rank { position: absolute; left: -12px; top: -10px; background: var(--accent); color: white; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .stock-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .ticker-name { font-size: 18px; font-weight: 800; color: #fff; }
        .score { font-size: 22px; font-weight: 900; color: var(--win); }
        .tags { display: flex; gap: 5px; margin-bottom: 10px; flex-wrap: wrap; }
        .tag { font-size: 10px; padding: 3px 8px; border-radius: 15px; font-weight: bold; text-transform: uppercase; }
        .tag-qnt { background: rgba(63, 185, 80, 0.2); color: var(--win); border: 1px solid var(--win); }
        .tag-qlt { background: rgba(212, 175, 55, 0.2); color: var(--gold); border: 1px solid var(--gold); }
        .evidence-section { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 12px; font-size: 12px; border: 1px solid #30363d; margin-top: 10px; }
        .ev-title { color: var(--accent); font-weight: bold; margin-bottom: 5px; display: block; border-bottom: 1px solid #30363d; padding-bottom: 3px; }
        .qnt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; color: #fff; }
        .risk-box { margin-top: 10px; font-size: 11px; padding: 8px; border-radius: 5px; background: rgba(248, 81, 73, 0.1); border-left: 3px solid var(--risk); }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0; letter-spacing: 1px;">🌍 Takuma World Assets</h2>
    <div style="font-size: 10px; color: var(--accent); margin-top: 5px;">FAILED-PROOF INVESTMENT ENGINE</div>
</div>

<div class="config-card">
    <div class="param-row"><span>割安性 (PBR/PER)</span><input type="range" id="v_val" value="80"></div>
    <div class="param-row"><span>収益性 (ROE/利益率)</span><input type="range" id="v_prof" value="70"></div>
    <div class="param-row"><span>マイナー/ワイドモート比</span><input type="range" id="v_moat" value="50"></div>
    <button class="update-btn" onclick="analyze()">最新エビデンスを解析実行</button>
</div>

<div id="container"></div>

<script>
const stocks = [
    { rank:1, ticker:"8593", name:"三菱HCキャピタル", score:94, pbr:0.75, per:9.2, roe:9.8, yield:4.1, minor:true, 
      qnt:"PBR1倍割れかつROEが目標の10%目前。25年連続増配の財務基盤は鉄壁。", 
      qlt:"国内リース最大手。アセット解体再構築能力が高く、不況下でもキャッシュを創出するワイドモートを保有。",
      risk:"金利上昇局面での利ザヤ縮小。対策：長期積立で時間分散を徹底する。" },
    { rank:2, ticker:"9432", name:"NTT", score:91, pbr:1.3, per:11.5, roe:14.2, yield:3.4, minor:false, 
      qnt:"営業利益率20%超え。EPSは20年以上にわたり右肩上がりを継続している。", 
      qlt:"日本最大の通信インフラ。IOWN構想による将来の価格決定権独占が期待されるバフェット銘柄候補。",
      risk:"政府の保有比率規制。対策：制度変更に惑わされず機械的購入を継続。" },
    { rank:3, ticker:"KO", name:"コカ・コーラ", score:89, pbr:10.5, per:24, roe:42, yield:3.1, minor:false, 
      qnt:"PBRは高いが、ROE40%超えという異常な経営効率。60年以上連続増配の配当王。", 
      qlt:"世界一のブランド認知度。インフレ時にコストを価格に100%転嫁できる圧倒的ワイドモート。",
      risk:"健康意識の高まりによる消費減。対策：新興国市場の成長を信じてホールド。" },
    { rank:4, ticker:"8058", name:"三菱商事", score:88, pbr:0.95, per:8.5, roe:15.5, yield:3.3, minor:false, 
      qnt:"バフェット買い増し銘柄。PBR1倍割れかつ高ROEを両立する理想的バリュー株。", 
      qlt:"資源から食品まで扱う「事業投資会社」への脱皮に成功。優秀な経営陣による資本効率の追求。",
      risk:"商品市況のボラティリティ。対策：資源価格の乱高下は無視し配当を再投資。" },
    { rank:5, ticker:"2471", name:"エスプール", score:85, pbr:3.2, per:18, roe:25, yield:3.0, minor:true, 
      qnt:"売上高営業利益率10%以上を継続。マイナー株ながら財務の健全性は高い。", 
      qlt:"障がい者雇用支援のパイオニア。法的義務化という「制度の壁」が強力な参入障壁（モート）となる。",
      risk:"法改正のリスク。対策：成長余力が高い間に小額投資（100円）で経験を積む。" },
    { rank:6, ticker:"ABBV", name:"アッヴィ", score:83, pbr:12, per:14, roe:55, yield:3.7, minor:true, 
      qnt:"10年間のEPS成長率が極めて高い。配当貴族指数採用の米国ヘルスケア大手。", 
      qlt:"バイオ医薬品の特許戦略。主力製品ヒュミラ後の新薬パイプラインが実り始めており将来性あり。",
      risk:"特許切れによる収益減。対策：新薬承認ニュースを追いつつ分散投資。" },
    { rank:7, ticker:"9107", name:"川崎汽船", score:81, pbr:0.65, per:5.2, roe:22, yield:4.5, minor:false, 
      qnt:"PBR0.6倍という極端な割安放置。強烈な株主還元（自社株買い）エビデンスあり。", 
      qlt:"海運市況に左右されるが、コンテナ船事業の統合により収益の安定性が向上。経営陣が還元に誠実。",
      risk:"景気後退による荷動き鈍化。対策：暴落時は「安全域」が広いと判断し買い増し。" },
    { rank:8, ticker:"MSFT", name:"マイクロソフト", score:79, pbr:13, per:35, roe:38, yield:0.8, minor:false, 
      qnt:"配当は低いがEPS成長が爆発的。自己資本比率も極めて高く倒産リスク皆無。", 
      qlt:"AzureとAIを組み合わせた「解約不能」なエコシステム。IT界のインフラであり最強のモート。",
      risk:"独占禁止法による提訴。対策：テクノロジーの進化を信じて20年保有。" },
    { rank:9, ticker:"1928", name:"積水ハウス", score:78, pbr:1.1, per:10.8, roe:11.2, yield:3.9, minor:false, 
      qnt:"25期以上連続で減配なし。売上高も安定成長しており、配当利回りの下値支持が強い。", 
      qlt:"米国住宅事業の成功により、国内市場の縮小を補完。ブランド力と高い顧客ロイヤリティを保有。",
      risk:"国内金利上昇による住宅ローン減。対策：米国の成長性に注目して継続保有。" },
    { rank:10, ticker:"7203", name:"トヨタ自動車", score:77, pbr:0.9, per:9.5, roe:12, yield:2.8, minor:false, 
      qnt:"PBR1倍割れ。時価総額日本一の盤石な財務。次世代電池への投資エビデンスが豊富。", 
      qlt:"全方位戦略によるEVシフトへの適応力。世界中に張り巡らされたサプライチェーンが最大の武器。",
      risk:"テスラ等、新興勢力との競争。対策：時価総額1位の安心感でポートフォリオの核に。" }
];

function analyze() {
    const v = document.getElementById('v_val').value / 100;
    const p = document.getElementById('v_prof').value / 100;
    const m = document.getElementById('v_moat').value / 100;
    const container = document.getElementById('container');
    container.innerHTML = "<div style='text-align:center; padding:50px;'>アルゴリズム解析中...</div>";

    setTimeout(() => {
        container.innerHTML = stocks.map(s => `
            <div class="stock-item">
                <div class="rank">${s.rank}</div>
                <div class="stock-header">
                    <div>
                        <span class="ticker-name">${s.name} (${s.ticker})</span>
                    </div>
                    <div class="score">${s.score}pts</div>
                </div>
                <div class="tags">
                    <span class="tag tag-qnt">定量評価済</span>
                    <span class="tag tag-qlt">ワイドモート確認</span>
                    ${s.minor ? '<span class="tag" style="background:#8957e5; color:#fff;">マイナー/中堅</span>' : ''}
                </div>
                <div class="qnt-grid">
                    <div>PBR: ${s.pbr}倍</div>
                    <div>ROE: ${s.roe}%</div>
                    <div>PER: ${s.per}倍</div>
                    <div>利回り: ${s.yield}%</div>
                </div>
                <div class="evidence-section">
                    <span class="ev-title">📊 定量的エビデンス（なぜこの数字か）</span>
                    ${s.qnt}
                </div>
                <div class="evidence-section" style="border-top: 1px solid #d4af3733;">
                    <span class="ev-title" style="color:var(--gold);">🏛️ 定性的エビデンス（事業の強み）</span>
                    ${s.qlt}
                </div>
                <div class="risk-box">
                    <strong>⚠️ リスクと対策:</strong> ${s.risk}
                </div>
            </div>
        `).join('');
    }, 600);
}
analyze();
</script>
</body>
</html>
