<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Takuma Investment Radar v3</title>
    <style>
        :root { --bg: #0d1117; --card: #161b22; --accent: #58a6ff; --win: #3fb950; --risk: #f85149; --text: #c9d1d9; --gold: #d4af37; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 10px; }
        .card { background: var(--card); border-radius: 15px; padding: 18px; margin-bottom: 15px; border: 1px solid #30363d; }
        .header { text-align: center; padding: 10px 0; border-bottom: 2px solid var(--accent); margin-bottom: 15px; }
        
        /* 距離表示エリア */
        .distance-display { text-align: center; background: linear-gradient(135deg, #1f2937, #111827); padding: 20px; border-radius: 12px; border: 2px solid var(--gold); }
        .current-progress { font-size: 14px; color: var(--gold); font-weight: bold; }
        .remain-val { font-size: 32px; font-weight: 900; color: #fff; margin: 5px 0; }
        .progress-bar { height: 12px; background: #30363d; border-radius: 6px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: var(--win); width: 0%; transition: width 0.8s ease; }

        /* 設定エリア */
        .param-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-size: 13px; }
        input[type="range"] { width: 50%; accent-color: var(--accent); }
        .val-hint { color: var(--accent); font-weight: bold; min-width: 60px; text-align: right; }

        /* 銘柄リスト */
        .stock-item { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; border-left: 5px solid var(--accent); }
        .ticker-name { font-weight: 800; color: #fff; }
        .evidence-box { font-size: 12px; margin-top: 8px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 8px; }
        
        .update-btn { width: 100%; padding: 15px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0;">🏆 Goal Tracking Radar</h2>
</div>

<div class="card distance-display">
    <div class="current-progress">目標配当まであと...</div>
    <div class="remain-val" id="remain_amt">¥200,000 / 月</div>
    <div class="progress-bar"><div class="progress-fill" id="p_fill"></div></div>
    <div style="font-size: 12px; color: var(--accent);" id="needed_capital">必要元本: 約6,000万円</div>
</div>

<div class="card">
    <div style="font-size:12px; font-weight:bold; margin-bottom:15px; color:var(--accent);">🔧 目標・戦略カスタマイズ</div>
    <div class="param-row">
        <span>目標配当額 (月)</span>
        <input type="range" id="target_val" min="1" max="50" value="20" oninput="calc()">
        <span class="val-hint" id="target_hint">20万円</span>
    </div>
    <div class="param-row">
        <span>現在の配当額 (月)</span>
        <input type="range" id="current_val" min="0" max="50" value="0.1" oninput="calc()">
        <span class="val-hint" id="current_hint">100円</span>
    </div>
    <div class="param-row">
        <span>想定利回り (%)</span>
        <input type="range" id="yield_val" min="1" max="10" value="4" oninput="calc()">
        <span class="val-hint" id="yield_hint">4.0%</span>
    </div>
</div>

<div id="stock_list"></div>

<script>
function calc() {
    const target = document.getElementById('target_val').value * 10000;
    const current = document.getElementById('current_val').value * 1000; // 0.1=100円〜
    const yield = document.getElementById('yield_val').value;
    
    // ヒント更新
    document.getElementById('target_hint').innerText = (target/10000) + "万円";
    document.getElementById('current_hint').innerText = current.toLocaleString() + "円";
    document.getElementById('yield_hint').innerText = yield + ".0%";

    // 残り距離計算
    const remain = target - current;
    document.getElementById('remain_amt').innerText = "¥" + remain.toLocaleString() + " / 月";
    
    // 進捗バー
    const progress = (current / target) * 100;
    document.getElementById('p_fill').style.width = Math.min(progress, 100) + "%";

    // 必要元本計算 (税引後利回りを想定)
    const capital = (target * 12) / (yield * 0.008); // 税金20%考慮
    document.getElementById('needed_capital').innerText = "目標達成に必要な元本: 約" + Math.round(capital / 10000).toLocaleString() + "万円";
}

const stockData = [
    { name: "JEPI", ticker: "ETF", yield: 7.5, ev: "米国株の現物とオプション取引を組み合わせ、月次配当を最大化する設計。月20万への最短ルート。" },
    { name: "三菱HCキャピタル", ticker: "8593", yield: 4.1, ev: "25年連続増配。100円投資でもコツコツ買い足せば、配当が着実に積み上がるエビデンス。" },
    { name: "NTT", ticker: "9432", yield: 3.4, ev: "日本最大の通信インフラ。dポイント還元と配当の二段構えで、生活費を削る最強の盾。" }
];

function renderStocks() {
    const list = document.getElementById('stock_list');
    list.innerHTML = stockData.map(s => `
        <div class="stock-item">
            <div style="display:flex; justify-content:space-between;">
                <span class="ticker-name">${s.name} (${s.ticker})</span>
                <span style="color:var(--win); font-weight:bold;">${s.yield}%</span>
            </div>
            <div class="evidence-box">${s.ev}</div>
        </div>
    `).join('');
}

window.onload = () => { calc(); renderStocks(); };
</script>
</body>
</html>
